name: Generate README

on:
  # 2 AM Spain time. CET = UTC+1 → 01:00 UTC. CEST = UTC+2 → 00:00 UTC.
  # Running at 01:00 UTC covers both offsets within ±1h.
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVGs and README
        env:
          # GH_PAT: classic Personal Access Token.
          # Create at github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)
          # Scopes needed: read:user, repo (for private repo language stats)
          # Store as repo secret named GH_PAT in Settings → Secrets → Actions
          #
          # The script also calls QuickChart.io (public, no auth) to render chart SVGs.
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: python3 scripts/generate_readme.py

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/ README.md
          git diff --cached --quiet || (git commit -m "chore: regenerate README charts" && git push)
